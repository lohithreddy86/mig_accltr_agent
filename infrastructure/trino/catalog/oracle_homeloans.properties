# =============================================================================
# Catalog: oracle_homeloans
# Purpose: SOURCE catalog representing the Oracle home-loans data warehouse,
#          re-hosted as Iceberg tables on MinIO. Read-mostly from the
#          migration accelerator's perspective; tables here mirror the
#          original Oracle schema (see README Section 8 table_mapping).
# =============================================================================

connector.name=iceberg

# Hive Metastore (shared with lz_lakehouse, separate database namespace)
iceberg.catalog.type=hive_metastore
hive.metastore.uri=thrift://hive-metastore:9083

# File format defaults
iceberg.file-format=PARQUET
iceberg.compression-codec=ZSTD

# Native S3 file system (Trino 4xx) — separate bucket for the source dataset
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=minio
s3.aws-secret-key=minio123

iceberg.register-table-procedure.enabled=true
iceberg.unique-table-location=true
